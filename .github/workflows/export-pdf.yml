name: Export PDF

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run export

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Slides
          files: slides-export.pdf
          body: Auto-generated PDF export of slides
